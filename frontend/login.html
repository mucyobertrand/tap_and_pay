<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TapPay | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@500&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        .float-animation { animation: float 6s ease-in-out infinite; }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-violet-50 min-h-screen flex items-center justify-center p-4">
    
    <div id="toast-container" class="fixed top-6 right-6 z-[100] flex flex-col gap-3"></div>

    <div class="w-full max-w-md">
        <!-- Logo Section -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-indigo-600 rounded-3xl shadow-2xl shadow-indigo-200 mb-4 float-animation">
                <i data-lucide="contactless" class="w-10 h-10 text-white"></i>
            </div>
            <h1 class="text-3xl font-800 tracking-tight flex items-center justify-center gap-2">
                TAP<span class="text-indigo-600 font-black italic">PAY</span>
            </h1>
            <p class="text-slate-500 text-sm mt-2">Terminal Access Portal</p>
        </div>

        <!-- Login Form -->
        <div class="bg-white/80 backdrop-blur-xl rounded-[2.5rem] p-8 shadow-2xl border border-white/50">
            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-3">Username</label>
                    <div class="relative">
                        <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                        <input 
                            type="text" 
                            id="username" 
                            name="username"
                            required
                            placeholder="Enter your username"
                            class="w-full pl-12 pr-4 py-4 bg-slate-50 rounded-2xl border-none ring-1 ring-slate-100 focus:ring-2 focus:ring-indigo-500 outline-none font-semibold transition-all"
                        >
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-3">Password</label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                        <input 
                            type="password" 
                            id="password" 
                            name="password"
                            required
                            placeholder="Enter your password"
                            class="w-full pl-12 pr-12 py-4 bg-slate-50 rounded-2xl border-none ring-1 ring-slate-100 focus:ring-2 focus:ring-indigo-500 outline-none font-semibold transition-all"
                        >
                        <button 
                            type="button" 
                            onclick="togglePassword()"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-300 hover:text-indigo-500 transition-colors"
                        >
                            <i id="eye-icon" data-lucide="eye" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <button 
                    type="submit" 
                    id="loginBtn"
                    class="w-full py-4 bg-indigo-600 text-white font-bold rounded-2xl hover:bg-indigo-700 active:scale-[0.98] transition-all shadow-lg shadow-indigo-100 flex items-center justify-center gap-3"
                >
                    <i data-lucide="log-in" class="w-5 h-5"></i>
                    <span>SIGN IN</span>
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-slate-100">
                <p class="text-center text-sm text-slate-500">
                    Don't have an account? 
                    <button onclick="showRegisterForm()" class="text-indigo-600 font-semibold hover:text-indigo-700 transition-colors">
                        Register here
                    </button>
                </p>
            </div>
        </div>

        <!-- Register Form (Hidden by default) -->
        <div id="registerForm" class="hidden bg-white/80 backdrop-blur-xl rounded-[2.5rem] p-8 shadow-2xl border border-white/50 mt-6">
            <h2 class="text-xl font-bold text-slate-800 mb-6 text-center">Create New Account</h2>
            <form id="registerFormElement" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Username</label>
                    <div class="relative">
                        <i data-lucide="user-plus" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                        <input 
                            type="text" 
                            id="reg-username" 
                            required
                            placeholder="Choose a username"
                            class="w-full pl-12 pr-4 py-3 bg-slate-50 rounded-2xl border-none ring-1 ring-slate-100 focus:ring-2 focus:ring-emerald-500 outline-none font-semibold transition-all"
                        >
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                        <input 
                            type="password" 
                            id="reg-password" 
                            required
                            placeholder="Create a password"
                            class="w-full pl-12 pr-4 py-3 bg-slate-50 rounded-2xl border-none ring-1 ring-slate-100 focus:ring-2 focus:ring-emerald-500 outline-none font-semibold transition-all"
                        >
                    </div>
                </div>

                <button 
                    type="submit" 
                    id="registerBtn"
                    class="w-full py-3 bg-emerald-600 text-white font-bold rounded-2xl hover:bg-emerald-700 active:scale-[0.98] transition-all shadow-lg shadow-emerald-100 flex items-center justify-center gap-3"
                >
                    <i data-lucide="user-plus" class="w-5 h-5"></i>
                    <span>CREATE ACCOUNT</span>
                </button>

                <button 
                    type="button" 
                    onclick="hideRegisterForm()"
                    class="w-full py-2 text-slate-400 font-bold text-xs hover:text-rose-500 transition uppercase tracking-widest"
                >
                    Back to Login
                </button>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Check if already authenticated
        async function checkAuth() {
            try {
                const response = await fetch('/api/check-auth');
                const data = await response.json();
                if (data.authenticated) {
                    window.location.href = '/';
                }
            } catch (error) {
                console.error('Auth check failed:', error);
            }
        }

        // Toggle password visibility
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.setAttribute('data-lucide', 'eye-off');
            } else {
                passwordInput.type = 'password';
                eyeIcon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }

        // Show register form
        function showRegisterForm() {
            document.getElementById('registerForm').classList.remove('hidden');
            document.querySelector('.bg-white\\/80').classList.add('hidden');
        }

        // Hide register form
        function hideRegisterForm() {
            document.getElementById('registerForm').classList.add('hidden');
            document.querySelector('.bg-white\\/80').classList.remove('hidden');
        }

        // Show toast notification
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bg = type === 'success' ? 'bg-emerald-600' : type === 'error' ? 'bg-rose-600' : 'bg-indigo-600';
            const icon = type === 'success' ? 'check-circle' : type === 'error' ? 'alert-circle' : 'info';
            
            toast.className = `${bg} text-white px-6 py-4 rounded-3xl shadow-2xl flex items-center gap-3 transform translate-y-4 opacity-0 transition-all duration-300 min-w-[280px]`;
            toast.innerHTML = `<i data-lucide="${icon}" class="w-5 h-5"></i><span class="font-bold text-sm">${message}</span>`;
            
            container.appendChild(toast);
            lucide.createIcons();
            
            setTimeout(() => { toast.classList.remove('translate-y-4', 'opacity-0'); }, 10);
            setTimeout(() => {
                toast.classList.add('translate-y-4', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // Handle login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i><span>SIGNING IN...</span>';
            lucide.createIcons();
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showToast('Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1500);
                } else {
                    showToast(data.error || 'Login failed', 'error');
                }
            } catch (error) {
                showToast('Network error. Please try again.', 'error');
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i data-lucide="log-in" class="w-5 h-5"></i><span>SIGN IN</span>';
                lucide.createIcons();
            }
        });

        // Handle registration
        document.getElementById('registerFormElement').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;
            const registerBtn = document.getElementById('registerBtn');
            
            registerBtn.disabled = true;
            registerBtn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i><span>CREATING...</span>';
            lucide.createIcons();
            
            try {
                const response = await fetch('/api/register-user', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showToast('Account created! Please login.', 'success');
                    hideRegisterForm();
                    document.getElementById('username').value = username;
                    document.getElementById('password').value = '';
                } else {
                    showToast(data.error || 'Registration failed', 'error');
                }
            } catch (error) {
                showToast('Network error. Please try again.', 'error');
            } finally {
                registerBtn.disabled = false;
                registerBtn.innerHTML = '<i data-lucide="user-plus" class="w-5 h-5"></i><span>CREATE ACCOUNT</span>';
                lucide.createIcons();
            }
        });

        // Check authentication on page load
        checkAuth();
    </script>
</body>
</html>
